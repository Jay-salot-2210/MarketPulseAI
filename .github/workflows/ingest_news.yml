name: Live News Ingestion

on:
  workflow_dispatch: 
    schedule:
    - cron: '0 * * * *' 

jobs:
  ingest_and_process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests supabase python-dotenv torch transformers sentence-transformers scikit-learn

      - name: 📥 Phase 1 - Run News Fetcher
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: |
          python -m scripts.fetch_news

      - name: 🧠 Phase 2 - Run Processing Engine
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python -m scripts.process_articles